services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 5000
      JWT_SECRET: soc-alerts-secret-key-change-in-prod
      FRONTEND_URL: http://localhost:3000
      EXTERNAL_DATABASE_URL: ${EXTERNAL_DATABASE_URL}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"